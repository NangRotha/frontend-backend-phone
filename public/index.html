    <!-- Tailwind CSS -->

    <!-- Custom CSS -->
    <style>
        * {
            font-family: 'Kantumruy Pro', 'Noto Sans Khmer', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        }
        
        body {
            margin: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #f9fafb;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #3b82f6, #8b5cf6);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(to bottom, #2563eb, #7c3aed);
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }
        
        .animate-slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .animate-pulse-slow {
            animation: pulse 2s infinite;
        }
        
        /* Loading spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    
    <title>PhoneHub | ហាងលក់ទូរស័ព្ទ និងគ្រឿងបន្លាស់</title>

  <body>
    <noscript>
        <div style="text-align: center; padding: 40px; background: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
            <div style="max-width: 500px; padding: 30px; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
                <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #f59e0b; margin-bottom: 16px;"></i>
                <h1 style="color: #1f2937; font-size: 24px; margin-bottom: 16px; font-family: 'Kantumruy Pro', sans-serif;">
                    សូមបើក JavaScript ដើម្បីប្រើប្រាស់កម្មវិធីនេះ
                </h1>
                <p style="color: #6b7280; font-size: 16px; margin-bottom: 24px;">
                    You need to enable JavaScript to run this app.
                </p>
                <div style="display: flex; gap: 12px; justify-content: center;">
                    <a href="https://enable-javascript.com/" target="_blank" rel="noopener noreferrer" style="background: #2563eb; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 500; display: inline-flex; align-items: center; gap: 8px;">
                        <i class="fas fa-external-link-alt"></i>
                        រៀនពីរបៀបបើក JavaScript
                    </a>
                </div>
            </div>
        </div>
    </noscript>
    
    <div id="root"></div>
    
    <!-- Loading indicator (will be hidden by React) -->
    <div id="initial-loader" style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s;
    ">
        <div style="text-align: center;">
            <i class="fas fa-mobile-alt" style="font-size: 60px; color: white; margin-bottom: 20px; animation: bounce 1s infinite;"></i>
            <div class="loader" style="margin: 0 auto 20px;"></div>
            <h2 style="color: white; font-size: 24px; margin-bottom: 8px; font-family: 'Kantumruy Pro', sans-serif;">
                <i class="fas fa-phone-alt" style="margin-right: 10px;"></i>
                PhoneHub
            </h2>
            <p style="color: rgba(255,255,255,0.9); font-size: 16px;">
                <i class="fas fa-spinner fa-spin" style="margin-right: 8px;"></i>
                កំពុងផ្ទុកកម្មវិធី...
            </p>
        </div>
    </div>
    
    <style>
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
    
    <script>
        // Hide loader when React is ready
        window.addEventListener('load', function() {
            setTimeout(function() {
                const loader = document.getElementById('initial-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(function() {
                        loader.style.display = 'none';
                    }, 500);
                }
            }, 1500);
        });
        
        // Handle offline/online events
        window.addEventListener('online', function() {
            document.body.classList.remove('offline');
            if (window.showToast) {
                window.showToast('បានភ្ជាប់បណ្តាញអ៊ីនធឺណិតវិញ', 'success');
            }
        });
        
        window.addEventListener('offline', function() {
            document.body.classList.add('offline');
            if (window.showToast) {
                window.showToast('មិនមានការតភ្ជាប់អ៊ីនធឺណិត', 'error');
            }
        });
        
        // Disable service worker to avoid 404 error
        // Service worker registration is disabled
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }
    </script>
